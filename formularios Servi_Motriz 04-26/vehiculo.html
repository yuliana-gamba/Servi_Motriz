<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Vehículo - ServiMotriz</title>

<link rel="stylesheet" href="vehiculo.css">

</head>

<body>

<div class="contenedor">


<h2> Vehículo</h2>

<form>

<label>Placa</label>
<input type="text" placeholder="Ingrese la placa del vehículo" required>

<label>Modelo</label>
<input type="text" placeholder="Ingrese el modelo" required>

<label>Color</label>
<input type="text" placeholder="Ingrese el color">

<label>Fecha de Registro</label>
<input type="date" required>

<label>Marca</label>
<input type="text" placeholder="Ingrese la marca del vehículo" required>

<label>Propietario</label>
<input type="text" placeholder="Ingrese el nombre del propietario" required>

<button type="submit" class="boton">
Registrar Vehículo
</button>

</form>

</div>

</body>
</html>
